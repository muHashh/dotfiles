"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
$status\
$directory\
$git_branch\
$git_status\
$fill\
$golang\
$nodejs\
$bun\
$deno\
$python\
$java\
$zig\
$rust\
$c\
$cmd_duration\
$time\
$line_break\
$character\
"""

# palette = "rose-pine"
add_newline = true

# [palettes.rose-pine]
# foreground = '#D9E0EE'
# background = '#1E1E2E'
# current_line = '#2E2E3E'
# primary = '#313244'
# box = '#2E2E3E'
# blue = '#31748f'
# cyan = '#9ccfd8'
# green = '#A6E3A1'
# orange = '#ebbcba'
# pink = '#F5BDE6'
# purple = '#c4a7e7'
# red = '#F38BA8'
# yellow = '#f6c177'
# status = '#eb6f92'


[os]
format = '(fg:black)[оӮ¶](fg:white)[$symbol ](fg:black bg:white)[оӮҙ](fg:white)'
disabled = false

[status]
format = " (fg:black)[оӮ¶](fg:red)[оҪ¶ ](fg:black bg:red)[оӮҙ](fg:red bg:black)[ $status](fg:white bg:black)[оӮҙ](fg:black)"
pipestatus = true
pipestatus_separator = "-"
pipestatus_segment_format = "$status"
pipestatus_format = " (fg:black)[оӮ¶](fg:red)[оҪ¶](fg:black bg:red)[оӮҙ](fg:red bg:black)[ $pipestatus](fg:white bg:black)[оӮҙ](fg:black)"
disabled = false

[directory]
format = ' (fg:black)[оӮ¶](fg:blue)[у°·Ҹ ](fg:black bg:blue)[оӮҙ](fg:blue bg:black)[ $read_only$truncation_symbol$path](fg:white bg:black)[оӮҙ](fg:black)'
home_symbol = "оӯҶ ~"
truncation_symbol = 'оҜҹ '
truncation_length = 5
read_only = 'уұ§ө '
read_only_style = ''

[git_branch]
format = ' (fg:black)[оӮ¶](fg:green)[$symbol ](fg:black bg:green)[оӮҙ](fg:green bg:black)[ $branch](fg:white bg:black)'
symbol = 'пҗ—'

[git_status]
format = '[$all_status](fg:green bg:black)[оӮҙ](fg:black)'
conflicted = ' ='
up_to_date = ''
untracked = ' ?${count}'
stashed = ' $'
modified = ' !${count}'
staged = ' +'
renamed = ' В»'
deleted = ' вңҳ'
ahead = ' вҮЎ${count}'
diverged = ' вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}'
behind = ' вҮЈ${count}'

[nodejs]
format = ' (fg:black)[оӮ¶](fg:green)[$symbol ](fg:black bg:green)[оӮҙ](fg:green bg:black)[ $version](fg:white bg:black)[оӮҙ](fg:black)'
symbol = 'у°Һҷ Node.js'

[bun]
format = ' (fg:black)[оӮ¶](fg:green)[$symbol ](fg:black bg:green)[оӮҙ](fg:green bg:black)[ $version](fg:white bg:black)[оӮҙ](fg:black)'
symbol = 'оқҜ Bun'

[deno]
format = ' (fg:black)[оӮ¶](fg:purple)[$symbol ](fg:black bg:purple)[оӮҙ](fg:purple bg:black)[ $version](fg:white bg:black)[оӮҙ](fg:black)'
symbol = 'рҹҰ• Deno'

[zig]
format = ' (fg:black)[оӮ¶](fg:blue)[$symbol ](fg:black bg:blue)[оӮҙ](fg:blue bg:black)[ $version](fg:white bg:black)[оӮҙ](fg:black)'
symbol = 'вҡЎпёҸ Zig'

[rust]
format = ' (fg:black)[оӮ¶](fg:yellow)[$symbol ](fg:black bg:yellow)[оӮҙ](fg:yellow bg:black)[ $version](fg:white bg:black)[оӮҙ](fg:black)'
symbol = 'оһЁ Rust'

[python]
format = ' (fg:black)[оӮ¶](fg:green)[$symbol ](fg:black bg:green)[оӮҙ](fg:green bg:black)[ (${version} )(\($virtualenv\) )](fg:white bg:black)[оӮҙ](fg:black)'
symbol = 'оңј python'

[java]
format = ' (fg:black)[оӮ¶](fg:red)[$symbol ](fg:black bg:red)[оӮҙ](fg:red bg:black)[ $version](fg:white bg:black)[оӮҙ](fg:black)'
symbol = 'оңё Java'

[golang]
format = ' (fg:black)[оӮ¶](fg:red)[$symbol ](fg:black bg:red)[оӮҙ](fg:red bg:black)[ $version](fg:white bg:black)[оӮҙ](fg:black)'
symbol = 'у°‘® Go'

[c]
format = ' (fg:black)[оӮ¶](fg:blue)[$symbol ](fg:black bg:blue)[оӮҙ](fg:blue bg:black)[ $version](fg:white bg:black)[оӮҙ](fg:black)'
symbol = 'оҳһ C'

[fill]
symbol = ' '
style = 'fg:black'

[cmd_duration]
min_time = 500
format = ' (fg:black)[оӮ¶](fg:yellow)[пғ§ ](fg:black bg:yellow)[оӮҙ](fg:yellow bg:black)[ $duration](fg:white bg:black)[оӮҙ](fg:black)'

[time]
format = ' (fg:black)[оӮ¶](fg:white)[у°Ұ– ](fg:black bg:white)[оӮҙ](fg:white bg:black)[ $time](fg:white bg:black)[оӮҙ](fg:black)'
time_format = '%H:%M'
disabled = false

[username]
format = ' (fg:black)[оӮ¶](fg:yellow)[пҗ• ](fg:black bg:yellow)[оӮҙ](fg:yellow bg:black)[ $user](fg:white bg:black)[оӮҙ](fg:black) '
show_always = true

[character]
format = '[$symbol](fg:black) '
success_symbol = '[пғҡ](fg:bold white)'
error_symbol = '[пғҡ](fg:bold red)'

[profiles]
transient = """$character"""

